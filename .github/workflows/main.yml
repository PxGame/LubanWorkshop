name: Luban Workshop
on:
  push:
    branches:
    - master
jobs:
  build:
    runs-on: windows-latest
    name: Build & Publish
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build
